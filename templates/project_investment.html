{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expenses</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
  </head>

  <body class = "investment-page">
    <div class="container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2>XYZ</h2>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'expenses' %}">Expenses</a>
        <a href="{% url 'investment' %}">Investment</a>
        <a href="{% url 'settings' %}">Settings</a>
      </aside>

      <!-- Main Content -->
      <div class="main">
        <div class="expense-card">
          
          <div class="header">
            <h1>Investment</h1>
            <a href="{% url 'add_investment' %}" class="btn primary">+ New Investment</a>
          </div>

          <table>
            <thead>
              <tr>
                <th>DETAILS</th>
                <th>MERCHANT</th>
                <th>AMOUNT</th>
                <th>REPORT</th>
                <th>STATUS</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td>ABC</td>
                <td>EFG</td>
                <td>XXXX</td>
                <td>PQR</td>
                <td><span class="status not-submitted">Not Submitted</span></td>
              </tr>

              <tr>
                <td>LMN</td>
                <td>SUV</td>
                <td>XXXX</td>
                <td>WXY</td>
                <td><span class="status submitted">Submitted</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
