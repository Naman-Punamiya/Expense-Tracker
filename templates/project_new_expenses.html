<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Expense</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0e0e0e;
}

.container {
  display: flex;
  height: 100vh;
}


.sidebar {
  width: 240px;
  background: #383434;
  color: rgb(200, 214, 235);
  padding: 20px;
}

.sidebar h2 { margin-bottom: 30px; }

.sidebar a {
  display: block;
  color: #31aec4;
  text-decoration: none;
  margin: 15px 0;
  font-size: 15px;
}

.sidebar a:hover { color: rgb(144, 207, 132); }


.main {
  flex: 1;
  padding: 30px;
  background: #0f0f0f;
  color: #fff;
}

.expense-card {
  background: #151515;
  padding: 25px;
  border-radius: 12px;
}

.expense-card h1 {
  margin-bottom: 20px;
}

.expense-body {
  display: flex;
  gap: 30px;
}


.form {
  flex: 1;
}

.form label {
  display: block;
  margin: 12px 0 6px;
  color: #aaa;
  font-size: 14px;
}

.form input,
.form textarea,
.form select {
  width: 100%;
  padding: 10px;
  background: #222;
  border: none;
  border-radius: 6px;
  color: #fff;
}


.row {
  display: flex;
  gap: 10px;
}


.upload {
  width: 280px;
  border: 2px dashed #333;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #777;
  font-size: 16px;
}

.upload span {
  font-size: 40px;
  margin-bottom: 10px;
}


.actions {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}

.actions button {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.draft {
  background: #1abc9c;
  color: #000;
}

.save {
  background: #00e5ff;
  color: #000;
}
</style>
</head>

<body>
<div class="container">

  
  <div class="sidebar">
    <h2>XYZ</h2>
    <a href="index.html"> Home</a>
    <a href="#"> Expenses</a>
    <a href="#"> Investment</a>
    <a href="#"> Settings</a>
  </div>

  
  <div class="main">
    <div class="expense-card">
      <h1>New Expense</h1>

      <div class="expense-body">

        
        <div class="form">
          <label>Subject</label>
          <input type="text">

          <label>Merchant</label>
          <input type="text">

          <label>Date</label>
          <input type="text">


          <label>Total</label>
          <div class="row">
            <input type="number">
            <select>
              <option>INR</option>
              <option>USD</option>
            </select>
          </div>

          <label>Description</label>
          <textarea rows="4"></textarea>

          <div class="actions">
            <button class="draft">Save Draft</button>
            <button class="save">Save</button>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>
</body>
</html>
