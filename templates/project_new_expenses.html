{%load static%}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Expense</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
  </head>

  <body>
    <div class="container">
      <div class="sidebar">
        <h2>XYZ</h2>
        <a href="{% url 'home'%}">Home</a>
        <a href="{% url 'expenses'%}">Expenses</a>
        <a href="{% url 'investment'%}">Investment</a>
        <a href="{% url 'settings'%}">Settings</a>
      </div>

      <div class="main">
        <div class="expense-card">
          <h1>New Expense</h1>

          <div class="expense-body">
            <div class="form">
              <label>Subject</label>
              <input type="text" />

              <label>Merchant</label>
              <input type="text" />

              <label>Date</label>
              <input type="text" />

              <label>Total</label>
              <div class="row">
                <input type="number" />
                <select>
                  <option>INR</option>
                  <option>USD</option>
                </select>
              </div>

              <label>Description</label>
              <textarea rows="4"></textarea>

              <div class="actions">
                <button class="draft">Save Draft</button>
                <button class="save">Save</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
