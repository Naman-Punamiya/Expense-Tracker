{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Edit Expense</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

<div class="container">

    <aside class="sidebar">
        <h2 class="logo">
            {% if request.user.is_authenticated %}
                {{ request.user.username }}
            {% else %}
                Guest
            {% endif %}
        </h2>

        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'expenses' %}" class="active">Expenses</a>
        <a href="{% url 'investment' %}">Investment</a>
        <a href="{% url 'settings' %}">Settings</a>
    </aside>

    <div class="main">

        <div class="header">
            <h1>Edit Expense</h1>
        </div>

        <div class="expense-card form">

            <form method="POST">
                {% csrf_token %}

                <label>Expense Name</label>
                <input type="text" name="expenseName" value="{{ expense.expenseName }}" required>

                <label>Category</label>
                <select name="category" required>
                    {% for category in categories %}
                    <option value="{{ category.id }}" {% if expense.category.id == category.id %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                    {% endfor %}
                </select>

                <label>Amount</label>
                <input type="number" name="amount" value="{{ expense.amount }}" required>

                <label>Currency</label>
                <input type="text" name="currency" value="{{ expense.currency }}" required>

                <label>Date</label>
                <input type="date" name="date" value="{{ expense.date|date:'Y-m-d' }}" required>

                <br><br>

                <button type="submit" class="btn primary">
                    Update Expense
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
