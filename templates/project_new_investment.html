{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Investment</title>
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>

<body class="investment-page">
  <div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
      <h2>XYZ</h2>
      <a href="{% url 'home'%}">Home</a>
      <a href="{% url 'expenses'%}">Expenses</a>
      <a href="{% url 'investment'%}" class="active">Investment</a>
      <a href="{% url 'settings'%}">Settings</a>
    </div>

    <!-- Main content -->
    <div class="main">

      <h1>New Investment</h1>

      <form method="post" action="{% url 'add_investment' %}" class="form">
        {% csrf_token %}

        <label>Details</label>
        <input type="text" name="name"  required>

        <label>Merchant / Platform</label>
        <input type="text" name="merchant" >

        <label>Date</label>
        <input type="date" name="date" required>

        <label>Amount</label>
        <div class="row">
          <input type="number" step="0.01" name="amount" required>
          <select name="currency">
            <option value="INR">INR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
          </select>
        </div>

        <label>Description</label>
        <textarea name="description" rows="4"></textarea>

        <div class="actions">
          <button type="submit" class="btn save">Save</button>
          <button type="reset" class="btn draft">Save Draft</button>
        </div>

      </form>

    </div>
  </div>
</body>
</html>
