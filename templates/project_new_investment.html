{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>New Investment</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

<div class="ExpensePage">

   <!-- Sidebar -->
   <div class="sidebar">
    <h2 class="logo">
        {% if request.user.is_authenticated %}
            {{ request.user.username }}
        {% else %}
            Guest
        {% endif %}
      </h2>
    <nav class="menu">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'expenses' %}" >Expenses</a>
        <a href="{% url 'investment' %}" class="active">Investment</a>
        <a href="{% url 'settings' %}">Settings</a>
        <form action="{% url 'logout' %}" method="post" style="margin-top:15px;">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </nav>
</div>


    <!-- Main -->
    <div class="main">

        <div class="table-card new-investment-card">

            <div class="header">
                <h1>New Investment</h1>
            </div>

            <!-- ✅ FORM START -->
            <form method="POST">

                {% csrf_token %}

                <div class="form">

                    <label>Investment Name</label>
                    <input type="text"
                           name="name"
                           placeholder="Enter investment name"
                           required>


                    <label>Date</label>
                    <input type="date"
                           name="date"
                           required>


                    <label>Amount</label>
                    <div class="row">

                        <input type="number"
                               step="0.01"
                               name="amount"
                               placeholder="Enter amount"
                               required>

                        <select name="currency">
                            <option value="INR">INR</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                        </select>

                    </div>


                    <label>Description</label>
                    <textarea name="description"
                              rows="4"
                              placeholder="Enter notes"></textarea>


                    <!-- Buttons -->
                    <div class="actions">

                        <a href="{% url 'investment' %}"
                           class="btn btn-secondary">
                           Cancel
                        </a>

                        <button type="submit"
                                class="btn btn-primary">
                            Save Investment
                        </button>

                    </div>

                </div>

            </form>
            <!-- ✅ FORM END -->

        </div>

    </div>

</div>

</body>
</html>
