{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Investment</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
  </head>

  <body>
    <div class="ExpensePage">
      <!-- Sidebar -->
      <div class="sidebar">
        <h2 class="logo">XYZ</h2>
        <nav class="menu">
          <a href="{% url 'home' %}">Home</a>
          <a href="{% url 'expenses' %}">Expenses</a>
          <a href="{% url 'investment' %}">Investment</a>
          <a href="{% url 'settings' %}">Settings</a>
        </nav>
      </div>

      <!-- Main Content -->
      <div class="main">
        <div class="table-card new-investment-card">
          <div class="header">
            <h1>New Investment</h1>
          </div>

          <div class="form">
            <label for="details">Details</label>
            <input
              type="text"
              id="details"
              placeholder="Enter investment details"
            />

            <label for="merchant">Merchant / Platform</label>
            <input
              type="text"
              id="merchant"
              placeholder="Enter merchant or platform"
            />

            <label for="date">Date</label>
            <input type="date" id="date" />

            <label>Amount</label>
            <div class="row">
              <input type="number" placeholder="Enter amount" />
              <select>
                <option>INR</option>
                <option>USD</option>
                <option>EUR</option>
              </select>
            </div>

            <label for="description">Description</label>
            <textarea
              id="description"
              rows="4"
              placeholder="Enter additional notes"
            ></textarea>

            <!-- Buttons moved here -->
            <div class="actions">
              <button class="btn btn-secondary">Save Draft</button>
              <button class="btn btn-primary">Save</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
