<!DOCTYPE html>

<title>Approvals</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0e0e0e;
}

.container {
  display: flex;
  height: 100vh;
}


.sidebar {
  width: 240px;
  background: #383434;
  color: rgb(200, 214, 235);
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  color: #31aec4;

  margin: 15px 0;
  font-size: 15px;
}

.sidebar a:hover {

  border-radius: 12px;
}

}


table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  text-align: left;
  font-size: 13px;
  color: #aaa;
  padding-bottom: 10px;
}

tbody tr {
  border-top: 1px solid #333;
}

td {
  padding: 14px 8px;
  font-size: 14px;
}


.badge {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
}

.travel { background: #2c2f5a; color: #b3bbff; }
.food { background: #4a1e1e; color: #ff9b9b; }
.software { background: #3c1c3c; color: #ffb0ff; }


.action-btn {
  cursor: pointer;
  margin-right: 10px;
  font-size: 16px;
}

.approve { color: #1abc9c; }
.reject { color: #e74c3c; }
</style>
</head>
