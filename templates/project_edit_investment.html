{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Investment</title>
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>

<body class="investment-page">
  <div class="container">

    <aside class="sidebar">
      <h2 class="logo">
        {% if request.user.is_authenticated %}
            {{ request.user.username }}
        {% else %}
            Guest
        {% endif %}
      </h2>
      <a href="{% url 'home' %}">Home</a>
      <a href="{% url 'expenses' %}">Expenses</a>
      <a href="{% url 'investment' %}" class="active">Investment</a>
      <a href="{% url 'settings' %}">Settings</a>
    </aside>

    <div class="main">
      <div class="header">
        <h1>Edit Investment</h1>
      </div>

      <div class="expense-card form">

        <form method="post">
          {% csrf_token %}

          <label>Name</label>
          <input type="text" name="name" value="{{ inv.investmentName }}" required>

          <label>Date</label>
          <input type="date" name="date" value="{{ inv.date }}" required>

          <label>Amount</label>
          <input type="number" step="0.01" name="amount" value="{{ inv.amount }}" required>

          <label>Currency</label>
          <select name="currency">
            <option value="INR" {% if inv.currency == "INR" %}selected{% endif %}>INR</option>
            <option value="USD" {% if inv.currency == "USD" %}selected{% endif %}>USD</option>
          </select>

          <label>Description</label>
          <textarea name="description">{{ inv.description }}</textarea>

          <br>
          <button type="submit" class="btn primary">Update Investment</button>
          <a href="{% url 'investment' %}" class="btn secondary">Cancel</a>

        </form>

      </div>
    </div>

  </div>
</body>
</html>
